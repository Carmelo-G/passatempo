<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Merge Monsters</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div id="game-container">
        <header>
            <h1>Merge Monsters 👾</h1>
            <div class="score-board">
                <div id="score-display">Punti: <span id="score">0</span></div>
            </div>
            <p class="instruction">Tocca per selezionare, tocca di nuovo per spostare. Unisci due uguali!</p>
        </header>

        <main>
            <div id="grid">
                <!-- 16 celle verranno generate da JS -->
            </div>
        </main>

        <footer>
            <div class="controls">
                <button id="spawn-button">Genera Mostro (+5 Punti)</button>
            </div>
            <button id="reset-button">Ricomincia</button>
        </footer>
    </div>
    
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    console.log('SW registered: ', registration.scope);
                })
                .catch(err => {
                    console.log('SW registration failed: ', err);
                });
            });
        }
    </script>
</body>
</html>
